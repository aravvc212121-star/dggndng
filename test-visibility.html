<body class="p-8">

      <span>❌ Mobile (hidden) | ✅ Desktop (lg:flex)</span>

  <p class="mt-8 text-sm text-gray-600">
    Resize window to test. Desktop = ≥1024px width
  </p>
</body>
</html>
